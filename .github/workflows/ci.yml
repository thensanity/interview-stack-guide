name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build -w @interview/db
      - run: npm run build -w @interview/graphql
      - run: npm run lint --workspaces --if-present
      - run: npm run test --workspaces --if-present

  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t interview-api:${{ github.sha }} .

  build-web:
    name: Build Web Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Web Docker image
        run: |
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=http://api:4000 \
            --build-arg NEXT_PUBLIC_GRAPHQL_URL=http://api:4000/graphql \
            -t interview-web:${{ github.sha }} .

  security-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    steps:
      - uses: actions/checkout@v4

      - name: Build images for scan
        run: |
          docker build -f apps/api/Dockerfile -t interview-api:scan .
          docker build -f apps/web/Dockerfile -t interview-web:scan .

      # Interview talking point: integrate Trivy, Snyk, or AWS ECR scan in production
      - name: Scan API image (placeholder)
        run: echo "Integrate Trivy/Snyk here for production pipelines"
