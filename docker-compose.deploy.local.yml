# Local full-stack deploy — no domain or HTTPS required
# Use this to verify everything works before public deploy.
#
#   docker compose -f docker-compose.deploy.local.yml up -d --build
#   Open http://localhost:3000/playground

services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATA_PROVIDER: mongodb
      MONGODB_URI: mongodb://mongodb:27017/interview-stack
      API_PORT: 4000
      SEED_DATA: "true"
      DEPLOY_TARGET: kubernetes
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-dev-secret
      RATE_LIMIT_MAX: 500
      ENABLE_AUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_GRAPHQL_URL: http://localhost:4000/graphql
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/playground"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

volumes:
  mongo_data:
