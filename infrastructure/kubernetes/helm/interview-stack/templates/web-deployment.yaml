apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "interview-stack.fullname" . }}-web
  labels:
    {{- include "interview-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: web
      {{- include "interview-stack.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: web
        {{- include "interview-stack.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.port }}
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://{{ include "interview-stack.fullname" . }}-api:{{ .Values.api.port }}"
            - name: NEXT_PUBLIC_GRAPHQL_URL
              value: "http://{{ include "interview-stack.fullname" . }}-api:{{ .Values.api.port }}/graphql"
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.port }}
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "interview-stack.fullname" . }}-web
  labels:
    {{- include "interview-stack.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: web
    {{- include "interview-stack.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: {{ .Values.web.port }}
  type: ClusterIP
