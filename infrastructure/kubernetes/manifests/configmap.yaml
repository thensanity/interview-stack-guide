apiVersion: v1
kind: ConfigMap
metadata:
  name: interview-api-config
  namespace: interview-stack
data:
  DATA_PROVIDER: "mongodb"
  API_PORT: "4000"
  DEPLOY_TARGET: "kubernetes"
  MONGODB_URI: "mongodb://mongodb:27017/interview-stack"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: interview-web-config
  namespace: interview-stack
data:
  NEXT_PUBLIC_API_URL: "http://interview-api:4000"
  NEXT_PUBLIC_GRAPHQL_URL: "http://interview-api:4000/graphql"
