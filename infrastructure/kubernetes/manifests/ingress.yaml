apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: interview-stack-ingress
  namespace: interview-stack
  annotations:
    # Interview: compare nginx vs AWS ALB ingress controller vs Traefik
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - interview.example.com
        - api.interview.example.com
      secretName: interview-tls
  rules:
    - host: interview.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: interview-web
                port:
                  number: 80
    - host: api.interview.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: interview-api
                port:
                  number: 4000
